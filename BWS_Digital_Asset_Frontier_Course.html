<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Understanding The Digital Asset Frontier — BWS Course</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0a0e1a;
    --navy-mid: #111827;
    --navy-card: #141c2e;
    --navy-border: #1e2d47;
    --gold: #d4a017;
    --gold-light: #f0c040;
    --gold-dim: #8a6510;
    --white: #f0f4ff;
    --muted: #6b7a99;
    --success: #22c55e;
    --error: #ef4444;
    --warning: #f59e0b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--navy);
    color: var(--white);
    font-family: 'Barlow', sans-serif;
    font-size: 16px;
    line-height: 1.7;
    min-height: 100vh;
  }

  /* ── LAYOUT ── */
  .shell { display: flex; min-height: 100vh; }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 280px;
    flex-shrink: 0;
    background: var(--navy-card);
    border-right: 1px solid var(--navy-border);
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0; left: 0; bottom: 0;
    overflow-y: auto;
    z-index: 100;
    transition: transform 0.3s ease;
  }

  .sidebar-logo {
    padding: 28px 24px 20px;
    border-bottom: 1px solid var(--navy-border);
  }

  .sidebar-logo .brand {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 3px;
    color: var(--gold);
    display: block;
  }

  .sidebar-logo .subtitle {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 2px;
  }

  .progress-bar-wrap {
    padding: 16px 24px;
    border-bottom: 1px solid var(--navy-border);
  }

  .progress-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1.5px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
  }

  .progress-track {
    height: 3px;
    background: var(--navy-border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold-dim), var(--gold));
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .chapter-nav { padding: 16px 0; flex: 1; }

  .chapter-btn {
    width: 100%;
    background: none;
    border: none;
    text-align: left;
    padding: 10px 24px;
    cursor: pointer;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    transition: background 0.15s;
    position: relative;
  }

  .chapter-btn:hover { background: rgba(212,160,23,0.06); }

  .chapter-btn.active {
    background: rgba(212,160,23,0.1);
    border-right: 2px solid var(--gold);
  }

  .chapter-btn.completed .ch-num { background: var(--gold); color: var(--navy); }
  .chapter-btn.completed .ch-num::after { content: '✓'; }

  .ch-num {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 1px solid var(--navy-border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    flex-shrink: 0;
    margin-top: 2px;
    transition: all 0.2s;
  }

  .ch-info { flex: 1; }

  .ch-title {
    font-family: 'Barlow', sans-serif;
    font-weight: 600;
    font-size: 13px;
    color: var(--white);
    line-height: 1.3;
    margin-bottom: 2px;
  }

  .chapter-btn.active .ch-title { color: var(--gold-light); }

  .ch-meta {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  .ch-score {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--gold);
    margin-left: auto;
    flex-shrink: 0;
    align-self: center;
  }

  .sidebar-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--navy-border);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* ── MAIN CONTENT ── */
  .main {
    margin-left: 280px;
    flex: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .topbar {
    padding: 20px 48px;
    border-bottom: 1px solid var(--navy-border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--navy-card);
    position: sticky;
    top: 0;
    z-index: 50;
  }

  .topbar-chapter {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--gold);
    text-transform: uppercase;
  }

  .topbar-actions { display: flex; gap: 12px; align-items: center; }

  .btn {
    font-family: 'Barlow', sans-serif;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.5px;
    padding: 8px 20px;
    border-radius: 4px;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-gold {
    background: var(--gold);
    color: var(--navy);
  }
  .btn-gold:hover { background: var(--gold-light); }

  .btn-outline {
    background: transparent;
    border: 1px solid var(--navy-border);
    color: var(--muted);
  }
  .btn-outline:hover { border-color: var(--gold-dim); color: var(--white); }

  /* ── CONTENT AREA ── */
  .content-area {
    padding: 48px;
    max-width: 820px;
    width: 100%;
  }

  /* ── CHAPTER HEADER ── */
  .chapter-header {
    margin-bottom: 48px;
  }

  .chapter-eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .chapter-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px;
    letter-spacing: 2px;
    line-height: 1.05;
    color: var(--white);
    margin-bottom: 16px;
  }

  .chapter-subtitle {
    font-size: 18px;
    color: var(--muted);
    font-weight: 300;
    max-width: 580px;
    line-height: 1.6;
  }

  .chapter-divider {
    height: 1px;
    background: linear-gradient(90deg, var(--gold-dim), transparent);
    margin: 32px 0;
  }

  /* ── KEY CONCEPTS BAR ── */
  .concepts-bar {
    background: var(--navy-card);
    border: 1px solid var(--navy-border);
    border-left: 3px solid var(--gold);
    border-radius: 6px;
    padding: 20px 24px;
    margin-bottom: 40px;
  }

  .concepts-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .concepts-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .concept-tag {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    background: rgba(212,160,23,0.1);
    border: 1px solid rgba(212,160,23,0.2);
    color: var(--gold-light);
    padding: 4px 10px;
    border-radius: 3px;
    letter-spacing: 0.5px;
  }

  /* ── SECTIONS ── */
  .section-block {
    margin-bottom: 40px;
  }

  .section-heading {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    letter-spacing: 1.5px;
    color: var(--gold);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .section-heading::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--navy-border);
  }

  .section-text {
    font-size: 16px;
    color: #c8d0e4;
    line-height: 1.8;
    margin-bottom: 16px;
  }

  /* ── CALLOUT BOX ── */
  .callout {
    background: rgba(212,160,23,0.07);
    border: 1px solid rgba(212,160,23,0.2);
    border-radius: 6px;
    padding: 20px 24px;
    margin: 24px 0;
  }

  .callout-icon { font-size: 20px; margin-bottom: 8px; }

  .callout-text {
    font-family: 'Barlow', sans-serif;
    font-weight: 500;
    font-size: 17px;
    color: var(--gold-light);
    line-height: 1.6;
  }

  /* ── KEY TERM ── */
  .key-term-grid {
    display: grid;
    gap: 12px;
    margin: 24px 0;
  }

  .key-term-row {
    display: flex;
    gap: 16px;
    align-items: flex-start;
    padding: 14px 18px;
    background: var(--navy-card);
    border: 1px solid var(--navy-border);
    border-radius: 5px;
  }

  .key-term-label {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--gold);
    min-width: 120px;
    flex-shrink: 0;
    padding-top: 2px;
  }

  .key-term-def {
    font-size: 14px;
    color: #a0aec0;
    line-height: 1.6;
  }

  /* ── QUOTE BLOCK ── */
  .quote-block {
    border-left: 3px solid var(--gold);
    padding: 16px 24px;
    margin: 28px 0;
    background: var(--navy-card);
    border-radius: 0 6px 6px 0;
  }

  .quote-text {
    font-size: 18px;
    font-weight: 500;
    color: var(--white);
    line-height: 1.6;
    font-style: italic;
  }

  /* ── QUIZ SECTION ── */
  .quiz-section {
    margin-top: 48px;
    border-top: 1px solid var(--navy-border);
    padding-top: 48px;
  }

  .quiz-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
  }

  .quiz-title-wrap {}

  .quiz-eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .quiz-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    letter-spacing: 2px;
    color: var(--white);
  }

  .quiz-counter {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--muted);
    text-align: right;
  }

  .quiz-counter span {
    display: block;
    font-size: 28px;
    font-weight: 500;
    color: var(--gold);
    line-height: 1;
  }

  .question-card {
    background: var(--navy-card);
    border: 1px solid var(--navy-border);
    border-radius: 8px;
    padding: 28px 32px;
    margin-bottom: 20px;
    transition: border-color 0.2s;
  }

  .question-card.answered { border-color: var(--navy-border); }

  .question-num {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .question-text {
    font-size: 16px;
    font-weight: 600;
    color: var(--white);
    line-height: 1.5;
    margin-bottom: 20px;
  }

  .options-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .option-btn {
    width: 100%;
    text-align: left;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--navy-border);
    border-radius: 5px;
    padding: 12px 18px;
    color: #a0aec0;
    font-family: 'Barlow', sans-serif;
    font-size: 15px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: all 0.15s;
  }

  .option-btn:hover:not(:disabled) {
    border-color: var(--gold-dim);
    color: var(--white);
    background: rgba(212,160,23,0.06);
  }

  .option-btn.correct {
    border-color: var(--success);
    background: rgba(34,197,94,0.1);
    color: var(--white);
  }

  .option-btn.incorrect {
    border-color: var(--error);
    background: rgba(239,68,68,0.08);
    color: #f87171;
  }

  .option-btn.reveal {
    border-color: var(--success);
    background: rgba(34,197,94,0.06);
    color: #86efac;
  }

  .option-letter {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    width: 22px;
    height: 22px;
    border-radius: 3px;
    border: 1px solid currentColor;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    opacity: 0.6;
  }

  .feedback-row {
    margin-top: 14px;
    padding: 12px 16px;
    border-radius: 5px;
    font-size: 14px;
    line-height: 1.5;
    display: none;
  }

  .feedback-row.show { display: block; }
  .feedback-row.correct-fb { background: rgba(34,197,94,0.1); color: #86efac; border: 1px solid rgba(34,197,94,0.2); }
  .feedback-row.incorrect-fb { background: rgba(239,68,68,0.08); color: #fca5a5; border: 1px solid rgba(239,68,68,0.2); }

  /* ── QUIZ RESULTS ── */
  .quiz-result {
    background: var(--navy-card);
    border: 1px solid var(--navy-border);
    border-radius: 10px;
    padding: 40px;
    text-align: center;
    display: none;
    margin-top: 24px;
  }

  .quiz-result.show { display: block; }

  .result-score {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 80px;
    color: var(--gold);
    line-height: 1;
    margin-bottom: 8px;
  }

  .result-label {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .result-message {
    font-size: 18px;
    color: var(--white);
    font-weight: 500;
    margin-bottom: 28px;
    line-height: 1.5;
  }

  .result-badge {
    display: inline-block;
    padding: 8px 20px;
    border-radius: 4px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 32px;
  }

  .badge-gold { background: rgba(212,160,23,0.15); border: 1px solid var(--gold); color: var(--gold); }
  .badge-silver { background: rgba(148,163,184,0.15); border: 1px solid #64748b; color: #94a3b8; }
  .badge-bronze { background: rgba(239,68,68,0.1); border: 1px solid #ef4444; color: #f87171; }

  .quiz-submit-bar {
    display: flex;
    justify-content: flex-end;
    gap: 12px;
    margin-top: 24px;
    padding-top: 24px;
    border-top: 1px solid var(--navy-border);
  }

  .btn-lg {
    font-size: 15px;
    padding: 12px 32px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* ── REFLECTION ── */
  .reflection-section {
    margin-top: 40px;
  }

  .reflection-item {
    padding: 16px 20px;
    border-left: 2px solid var(--navy-border);
    margin-bottom: 12px;
    font-size: 15px;
    color: #8899bb;
    line-height: 1.6;
    transition: border-color 0.2s;
  }

  .reflection-item:hover {
    border-left-color: var(--gold-dim);
    color: #a0aec0;
  }

  /* ── CHAPTER NAV FOOTER ── */
  .chapter-nav-footer {
    display: flex;
    justify-content: space-between;
    padding: 32px 48px;
    border-top: 1px solid var(--navy-border);
    margin-top: auto;
  }

  /* ── HOME SCREEN ── */
  .home-screen {
    padding: 64px 48px;
    max-width: 860px;
  }

  .home-eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .home-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 72px;
    letter-spacing: 3px;
    line-height: 1.0;
    color: var(--white);
    margin-bottom: 8px;
  }

  .home-title span { color: var(--gold); }

  .home-subtitle {
    font-size: 20px;
    color: var(--muted);
    font-weight: 300;
    margin-bottom: 48px;
    max-width: 520px;
    line-height: 1.6;
  }

  .home-pillars {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
    margin-bottom: 48px;
  }

  .pillar-card {
    background: var(--navy-card);
    border: 1px solid var(--navy-border);
    border-radius: 8px;
    padding: 24px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .pillar-card:hover {
    border-color: var(--gold-dim);
    transform: translateY(-2px);
  }

  .pillar-icon { font-size: 28px; margin-bottom: 12px; }

  .pillar-num {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .pillar-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 1px;
    color: var(--white);
    margin-bottom: 8px;
  }

  .pillar-desc {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.5;
  }

  .home-start-btn {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 3px;
    padding: 16px 48px;
    background: var(--gold);
    color: var(--navy);
    border: none;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .home-start-btn:hover {
    background: var(--gold-light);
    transform: translateY(-1px);
  }

  /* ── MOBILE ── */
  .mobile-menu-btn {
    display: none;
    position: fixed;
    top: 16px;
    left: 16px;
    z-index: 200;
    background: var(--gold);
    color: var(--navy);
    border: none;
    width: 40px;
    height: 40px;
    border-radius: 4px;
    font-size: 18px;
    cursor: pointer;
    align-items: center;
    justify-content: center;
  }

  @media (max-width: 900px) {
    .sidebar { transform: translateX(-100%); }
    .sidebar.open { transform: translateX(0); }
    .main { margin-left: 0; }
    .mobile-menu-btn { display: flex; }
    .content-area, .home-screen { padding: 32px 24px; }
    .topbar { padding: 16px 24px; }
    .chapter-nav-footer { padding: 24px; }
    .home-title { font-size: 48px; }
    .home-pillars { grid-template-columns: 1fr; }
    .chapter-title { font-size: 36px; }
  }
</style>
</head>

<button class="mobile-menu-btn" id="menuBtn" onclick="toggleMenu()">☰</button>

<div class="shell">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <span class="brand">BLOCK WALL STREET</span>
      <span class="subtitle">Digital Asset Frontier</span>

  <main class="main" id="mainContent">

<script>
// ─── DATA ─────────────────────────────────────────────────────────────────────

const chapters = [
  {
    id: 0,
    title: "Home",
    hidden: true,
  },
  {
    id: 1,
    title: "What Is Money (Really)?",
    subtitle: "Money Is Time. Money Is Energy. Money Is Storage.",
    eyebrow: "Chapter 01",
    icon: "⚡",
    concepts: ["Money = Stored Time & Energy", "The Dollar's Weakness", "Inflation as Energy Dilution", "Stronger Storage Vehicles", "Bitcoin's Role"],
    sections: [
      {
        heading: "The Truth About Money",
        body: `Most people believe money is something you receive — a paycheck, a deposit, a number on a screen. But that perspective misses the deeper reality. Money is what remains after you've already given something up. You gave your time, your effort, your focus, and your energy — and in return, you received a financial container for it.\n\nThis reframes everything. When you work eight hours, you didn't simply "make money." You converted hours of your life, your physical or mental energy, and your attention into a vehicle — one that happens to be denominated in dollars.`,
      },
      {
        heading: "The Problem With the Main Vehicle",
        body: `Right now, most people store their energy in one place: the U.S. Dollar — which is controlled by the Federal Reserve. The system has the power to create new money out of nothing, adjust interest rates, and expand or contract the money supply at will.\n\nHere's the critical implication: if money equals stored energy, then printing more money dilutes your stored energy. You work all week and store your energy in $1,000. But then more dollars are printed. Now there are more dollars in the system — but the same amount of goods and resources. Each dollar becomes weaker.`,
      },

// ─── STATE ────────────────────────────────────────────────────────────────────

const state = {
  currentView: 'home', // 'home' | 'chapter'
  currentChapter: null,
  quizAnswers: {},    // chapterId -> { qIdx: { selected, correct } }
  quizSubmitted: {},  // chapterId -> bool
  scores: {},         // chapterId -> { correct, total }
};

// ─── SIDEBAR ─────────────────────────────────────────────────────────────────

function renderSidebar() {
  const nav = document.getElementById('chapterNav');
  const completedCount = Object.keys(state.scores).length;
  const totalChapters = chapters.filter(c => !c.hidden).length;
  const pct = Math.round((completedCount / totalChapters) * 100);

  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';

  nav.innerHTML = chapters.filter(c => !c.hidden).map(ch => {
    const isActive = state.currentChapter === ch.id;
    const isCompleted = state.scores[ch.id] !== undefined;
    const score = state.scores[ch.id];
    return `
      <button class="chapter-btn ${isActive ? 'active' : ''} ${isCompleted ? 'completed' : ''}"
              onclick="navigate(${ch.id})">
        <div class="ch-num">${isCompleted ? '' : ch.id}</div>
        <div class="ch-info">
          <div class="ch-title">${ch.title}</div>
          <div class="ch-meta">${ch.quiz.length} Questions</div>
        </div>
        ${isCompleted ? `<div class="ch-score">${score.correct}/${score.total}</div>` : ''}
      </button>
    `;
  }).join('');
}

// ─── NAVIGATION ──────────────────────────────────────────────────────────────

function navigate(chapterId) {
  if (chapterId === 0) {
    state.currentView = 'home';
    state.currentChapter = null;
  } else {
    state.currentView = 'chapter';
    state.currentChapter = chapterId;
  }
  renderAll();
  window.scrollTo(0, 0);
  // close mobile menu
  document.getElementById('sidebar').classList.remove('open');
}

function renderAll() {
  renderSidebar();
  if (state.currentView === 'home') {
    renderHome();
  } else {
    renderChapter(state.currentChapter);
  }
}

  const root = document.getElementById('appRoot');

      </div>

      <!-- SECTIONS -->
      ${ch.sections.map(s => `
        <div class="section-block">
          <div class="section-heading">${s.heading}</div>
          ${s.body.split('\n\n').map(p => `<p class="section-text">${p}</p>`).join('')}
        </div>
      `).join('<div class="chapter-divider"></div>')}

      <!-- KEY TERMS -->
      <div class="section-block">
        <div class="section-heading">Key Terms</div>
        <div class="key-term-grid">
          ${ch.keyTerms.map(t => `
            <div class="key-term-row">
              <div class="key-term-label">${t.term}</div>
              <div class="key-term-def">${t.def}</div>
            </div>
          `).join('')}
        </div>
      </div>

      <!-- CLOSING THOUGHT -->
      <div class="quote-block">
        <div class="quote-text">"${ch.closingThought}"</div>
      </div>

      <!-- REFLECTION -->
      <div class="section-block reflection-section">
        <div class="section-heading">Reflection Questions</div>
        ${ch.reflections.map(r => `<div class="reflection-item">→ ${r}</div>`).join('')}
      </div>

      <!-- QUIZ -->
      <div class="quiz-section" id="quizSection-${id}">
        <div class="quiz-header">
          <div class="quiz-title-wrap">
            <div class="quiz-eyebrow">Knowledge Check</div>
            <div class="quiz-title">CHAPTER ${id} QUIZ</div>
          </div>
          <div class="quiz-counter">Questions<span>${ch.quiz.length}</span></div>
        </div>

        ${ch.quiz.map((q, i) => renderQuestion(id, q, i)).join('')}

        <div class="quiz-submit-bar">
          <button class="btn btn-outline" onclick="resetQuiz(${id})">Reset Quiz</button>
          <button class="btn btn-gold btn-lg" onclick="submitQuiz(${id})" id="submitBtn-${id}">
            Submit Answers
          </button>
        </div>

        <div class="quiz-result" id="quizResult-${id}"></div>
      </div>

    </div>

    <div class="chapter-nav-footer">
      ${id > 1 ? `<button class="btn btn-outline" onclick="navigate(${id - 1})">← Chapter ${id - 1}</button>` : '<div></div>'}
      ${id < 6 ? `<button class="btn btn-gold" onclick="navigate(${id + 1})">Chapter ${id + 1} →</button>` : `<button class="btn btn-gold" onclick="navigate(0)">← Back to Home</button>`}
    </div>
  `;

  // restore saved state
  restoreQuizState(id);
}

function renderQuestion(chId, q, i) {
  const letters = ['A', 'B', 'C', 'D'];
  return `
    <div class="question-card" id="qcard-${chId}-${i}">
      <div class="question-num">Question ${i + 1} of ${chapters.find(c => c.id === chId).quiz.length}</div>
      <div class="question-text">${q.q}</div>
      <div class="options-list">
        ${q.options.map((opt, j) => `
          <button class="option-btn" id="opt-${chId}-${i}-${j}"
                  onclick="selectOption(${chId}, ${i}, ${j})">
            <span class="option-letter">${letters[j]}</span>
            ${opt}
          </button>
        `).join('')}
      </div>
      <div class="feedback-row" id="fb-${chId}-${i}"></div>
    </div>
  `;
}

function selectOption(chId, qIdx, optIdx) {
  if (state.quizSubmitted[chId]) return;

  if (!state.quizAnswers[chId]) state.quizAnswers[chId] = {};
  state.quizAnswers[chId][qIdx] = optIdx;

  // update UI
  const ch = chapters.find(c => c.id === chId);
  const opts = ch.quiz[qIdx].options;
  opts.forEach((_, j) => {
    const btn = document.getElementById(`opt-${chId}-${qIdx}-${j}`);
    if (btn) {
      btn.classList.remove('correct', 'incorrect', 'reveal');
      btn.style.borderColor = '';
    }
  });

  const selectedBtn = document.getElementById(`opt-${chId}-${qIdx}-${optIdx}`);
  if (selectedBtn) selectedBtn.style.borderColor = 'var(--gold-dim)';
}

function submitQuiz(chId) {
  const ch = chapters.find(c => c.id === chId);
  const answers = state.quizAnswers[chId] || {};
  const total = ch.quiz.length;
  let correct = 0;

  ch.quiz.forEach((q, i) => {
    const selected = answers[i];
    const isCorrect = selected === q.answer;
    if (isCorrect) correct++;

    // update option styles
    q.options.forEach((_, j) => {
      const btn = document.getElementById(`opt-${chId}-${i}-${j}`);
      if (!btn) return;
      btn.disabled = true;
      btn.style.borderColor = '';
      if (j === q.answer) btn.classList.add(selected !== undefined ? 'reveal' : 'reveal');
      if (selected === j && selected !== q.answer) btn.classList.add('incorrect');
      if (selected === j && selected === q.answer) {
        btn.classList.remove('reveal');
        btn.classList.add('correct');
      }
    });

    // show feedback
    const fb = document.getElementById(`fb-${chId}-${i}`);
    if (fb) {
      fb.textContent = (selected !== undefined)
        ? (isCorrect ? '✓ ' : '✗ ') + q.feedback
        : '— You did not answer this question. ' + q.feedback;
      fb.className = `feedback-row show ${isCorrect ? 'correct-fb' : 'incorrect-fb'}`;
    }
  });

  state.quizSubmitted[chId] = true;
  state.scores[chId] = { correct, total };

  // show result
  const pct = Math.round((correct / total) * 100);
  let badge, msg;
  if (pct >= 90) { badge = 'badge-gold'; msg = 'Outstanding. You have a command-level understanding of this material.'; }
  else if (pct >= 70) { badge = 'badge-silver'; msg = 'Solid work. Review the questions you missed and revisit the section before moving on.'; }
  else { badge = 'badge-bronze'; msg = 'Keep building. Re-read the chapter carefully — the concepts here are foundational.'; }

  const resultEl = document.getElementById(`quizResult-${chId}`);
  if (resultEl) {
    resultEl.className = 'quiz-result show';
    resultEl.innerHTML = `
      <div class="result-score">${pct}%</div>
      <div class="result-label">${correct} of ${total} correct</div>
      <div class="result-message">${msg}</div>
      <div class="result-badge ${badge}">${pct >= 90 ? '🏆 MASTERY' : pct >= 70 ? '✦ PROFICIENT' : '⟳ KEEP STUDYING'}</div>
    `;
  }

  const submitBtn = document.getElementById(`submitBtn-${chId}`);
  if (submitBtn) submitBtn.disabled = true;

  renderSidebar();
}

function resetQuiz(chId) {
  delete state.quizAnswers[chId];
  delete state.quizSubmitted[chId];
  delete state.scores[chId];
  renderAll();
}

function restoreQuizState(chId) {
  if (!state.quizSubmitted[chId]) return;
  submitQuiz(chId);
}

// ─── MOBILE MENU ─────────────────────────────────────────────────────────────

function toggleMenu() {
  document.getElementById('sidebar').classList.toggle('open');
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
renderAll();
</script>
</body>
</html>
